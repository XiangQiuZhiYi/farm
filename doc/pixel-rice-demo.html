<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素画 Demo - 水田水稻成长阶段</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --line: #243041;
      --text: #e5eefc;
      --muted: #9fb0c8;
      --accent: #74c69d;
      --accent-2: #8ecae6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "SF Pro SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, #1e293b 0%, #0f172a 55%, #0b1220 100%);
      color: var(--text);
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero {
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 20px;
    }

    .panel {
      background: rgba(17, 24, 39, 0.88);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: rgba(15, 23, 42, 0.75);
    }

    .card h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .card p,
    .meta li,
    .preview-copy p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    canvas {
      width: 100%;
      max-width: 260px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-radius: 12px;
      border: 1px solid #324152;
      background: linear-gradient(#a7ddff 0 34%, #7ed0ff 34% 100%);
      display: block;
      margin: 0 auto 12px;
    }

    .preview-stage {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(116, 198, 157, 0.1);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
    }

    .preview-copy {
      margin-bottom: 16px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0 18px;
    }

    button {
      border: 1px solid #355070;
      background: #172235;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    button.active {
      background: rgba(142, 202, 230, 0.18);
      border-color: var(--accent-2);
      color: #d8f3ff;
    }

    .meta {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
    }

    .legend {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      flex: 0 0 auto;
    }

    @media (max-width: 880px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>像素画 Demo：水田里的水稻 4 阶段</h1>
      <p>
        这个 demo 用最接近游戏资源接入的方式来展示：同一块 <strong>水田地块</strong> 上，
        叠加水稻的 <strong>seed / sprout / grow / mature</strong> 四张像素图。
        后续你只要继续补充别的土地底图和植物帧，就能扩展成完整资源系统。
      </p>
    </section>

    <div class="layout">
      <section class="panel">
        <h2>四阶段对照</h2>
        <div id="stage-grid" class="grid"></div>
      </section>

      <section class="panel">
        <h2>动态预览</h2>
        <div class="preview-stage" id="preview-stage">seed</div>
        <canvas id="preview-canvas" width="256" height="256" aria-label="水稻像素画预览"></canvas>
        <div class="preview-copy">
          <p id="preview-note"></p>
        </div>
        <div id="controls" class="controls"></div>
        <ul class="meta">
          <li>地块底图固定：当前示例使用 <strong>水田</strong>，水层和田埂都保留下来。</li>
          <li>植物单独出帧：后续换成玉米、白菜，只需要替换植物像素数据。</li>
          <li>成长切图固定：每种植物默认保留 4 张阶段图，接入配置也最简单。</li>
        </ul>

        <div class="legend">
          <div class="legend-row"><span class="swatch" style="background:#5aa9e6"></span> 水层</div>
          <div class="legend-row"><span class="swatch" style="background:#7b4f2f"></span> 田埂</div>
          <div class="legend-row"><span class="swatch" style="background:#2f8f46"></span> 稻叶深绿</div>
          <div class="legend-row"><span class="swatch" style="background:#8ddf64"></span> 稻叶浅绿</div>
          <div class="legend-row"><span class="swatch" style="background:#f0d86f"></span> 稻穗成熟黄</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const TILE_SIZE = 16;
    const SCALE = 16;

    const palette = {
      ".": null,
      "S": "#b7e3ff",
      "W": "#5aa9e6",
      "R": "#7b4f2f",
      "D": "#6d4427",
      "G": "#2f8f46",
      "L": "#8ddf64",
      "Y": "#f0d86f",
      "T": "#7d5a32",
      "P": "#d9f2ff"
    };

    // 土地和植物分层绘制，后续扩展时可以保持“底图一套 + 植物多套”的资源结构。
    const paddyTile = [
      "SSSSSSSSSSSSSSSS",
      "SSSSSSSSSSSSSSSS",
      "SSSSSSSSSSSSSSSS",
      "WWWWWWWWWWWWWWWW",
      "WWWWWWWWWWWWWWWW",
      "WWWWWWWWWWWWWWWW",
      "RRRRRRRRRRRRRRRR",
      "DDDDDDDDDDDDDDDD",
      "WWWWWWWWWWWWWWWW",
      "WWWWWWWWWWWWWWWW",
      "WWWWWWWWWWWWWWWW",
      "RRRRRRRRRRRRRRRR",
      "DDDDDDDDDDDDDDDD",
      "WWWWWWWWWWWWWWWW",
      "WWWWWWWWWWWWWWWW",
      "WWWWWWWWWWWWWWWW"
    ];

    const stages = [
      {
        id: "seed",
        title: "1. Seed",
        note: "刚播种，主要看到的是水田和很小的种子点位。",
        pixels: [
          "................",
          "................",
          "................",
          "................",
          "................",
          "................",
          "................",
          "................",
          "................",
          "................",
          "................",
          ".......TT.......",
          "......TTTT......",
          "................",
          "................",
          "................"
        ]
      },
      {
        id: "sprout",
        title: "2. Sprout",
        note: "发芽阶段叶片短小，适合用 1~2 个主茎 + 少量斜叶来表现。",
        pixels: [
          "................",
          "................",
          "................",
          "................",
          "................",
          "................",
          "................",
          "................",
          "........L.......",
          ".......GL.......",
          "........G.......",
          ".......GT.......",
          "......TTTT......",
          "................",
          "................",
          "................"
        ]
      },
      {
        id: "grow",
        title: "3. Grow",
        note: "生长期叶片展开，主视觉从“点”变成“簇”，玩家能明显感觉到成长。",
        pixels: [
          "................",
          "................",
          "................",
          "................",
          "................",
          ".......L........",
          "......LGG.......",
          ".....LGGL.......",
          ".......GG.......",
          "......LGGL......",
          ".....LGGGGL.....",
          ".......GT.......",
          "......TTTT......",
          "................",
          "................",
          "................"
        ]
      },
      {
        id: "mature",
        title: "4. Mature",
        note: "成熟阶段加入金黄色稻穗，让玩家一眼能区分“可以收获”的状态。",
        pixels: [
          "................",
          "................",
          "................",
          "................",
          "......YYY.......",
          ".....YYYYY......",
          "......LGG.......",
          ".....LGGLL......",
          "....LGGGGG......",
          ".....LGGLL......",
          "....LGGGGGL.....",
          "......GTT.......",
          ".....TTTTT......",
          "................",
          "................",
          "................"
        ]
      }
    ];

    const drawLayer = (ctx, layer, scale) => {
      layer.forEach((row, y) => {
        [...row].forEach((cell, x) => {
          const color = palette[cell];
          if (!color) return;
          ctx.fillStyle = color;
          ctx.fillRect(x * scale, y * scale, scale, scale);
        });
      });
    };

    const renderTile = (canvas, stage) => {
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 先画土地，再叠植物，能保证同一植物可复用到不同土地上。
      drawLayer(ctx, paddyTile, SCALE);
      drawLayer(ctx, stage.pixels, SCALE);

      // 最后补一个轻量网格，方便你观察每个像素块在资源里的占位。
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      for (let i = 0; i <= TILE_SIZE; i += 1) {
        const offset = i * SCALE;
        ctx.beginPath();
        ctx.moveTo(offset, 0);
        ctx.lineTo(offset, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, offset);
        ctx.lineTo(canvas.width, offset);
        ctx.stroke();
      }
    };

    const grid = document.getElementById("stage-grid");
    const controls = document.getElementById("controls");
    const previewCanvas = document.getElementById("preview-canvas");
    const previewStage = document.getElementById("preview-stage");
    const previewNote = document.getElementById("preview-note");

    let activeIndex = 0;

    const syncPreview = (index) => {
      activeIndex = index;
      const current = stages[index];
      renderTile(previewCanvas, current);
      previewStage.textContent = current.id;
      previewNote.textContent = current.note;

      [...controls.querySelectorAll("button")].forEach((button, buttonIndex) => {
        button.classList.toggle("active", buttonIndex === index);
      });
    };

    stages.forEach((stage, index) => {
      const card = document.createElement("article");
      card.className = "card";

      const canvas = document.createElement("canvas");
      canvas.width = TILE_SIZE * SCALE;
      canvas.height = TILE_SIZE * SCALE;
      renderTile(canvas, stage);

      const title = document.createElement("h3");
      title.textContent = stage.title;

      const note = document.createElement("p");
      note.textContent = stage.note;

      card.append(canvas, title, note);
      grid.appendChild(card);

      const button = document.createElement("button");
      button.textContent = stage.id;
      button.addEventListener("click", () => syncPreview(index));
      controls.appendChild(button);
    });

    syncPreview(0);

    // 自动轮播只是为了演示成长感，实际游戏里应该由作物状态驱动切帧。
    setInterval(() => {
      syncPreview((activeIndex + 1) % stages.length);
    }, 1600);
  </script>
</body>
</html>
